<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .card {
            /* border: 4px solid green; */
            box-shadow: 0 0 10px green;
            padding: 10px;
            width: 270px;
            height: 400px;
        }
        #container{
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
        }

    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        function createCard(name,imageUrl) {
            return <div class="card">
                <img src={imageUrl}
                    width="100%" height="200px" />

                <h3> {name} </h3>
                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Tempora possimus rem facere voluptate modi maxime placeat.</p>
                <button>Profile Details</button>
            </div>;
        }

        function multipleCard(){
            return <div id="container">
                {createCard("Vishnu",
                            "https://static.vecteezy.com/system/resources/thumbnails/033/129/417/small/a-business-man-stands-against-white-background-with-his-arms-crossed-ai-generative-photo.jpg"
                )}
                {createCard("Ramu",
                            "https://t3.ftcdn.net/jpg/02/79/78/48/360_F_279784836_4eKMjfIfDtaICKmaSBAyft2Y43u5V76Q.jpg"
                )}
                {createCard("Krishna",
                            "https://www.shutterstock.com/image-photo/portrait-successful-business-woman-suit-260nw-2468636115.jpg"
                )}
                {createCard("Siva",
                            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtJpldkUDbZS1GrO2KNncO094Tb7Sw1cbCSA&s"
                )}
                </div>
        }

        ReactDOM.render(multipleCard(), document.getElementById("root"));
    </script>
</body>

</html>
